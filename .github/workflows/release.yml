name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write # needed for creating GitHub Releases
  id-token: write # needed for npm provenance (npm publish --provenance)

jobs:
  build-test-publish:
    name: Build, Test, Publish to npm, and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        id: vercheck
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check if version already published to npm
        id: npmlookup
        shell: bash
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="${{ steps.vercheck.outputs.version }}"
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_NAME@$PKG_VERSION already exists on npm. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_NAME@$PKG_VERSION not found on npm. Will publish."
          fi

      - name: Publish to npm
        if: steps.npmlookup.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish with provenance if supported; falls back if not available.
          npm publish --access public --provenance || npm publish --access public

      - name: Create npm package tarball
        run: |
          PKG_TARBALL_JSON="$(npm pack --json)"
          echo "$PKG_TARBALL_JSON" | tee npm-pack.json
          # Extract filename from npm pack output (first tarball object)
          FILENAME="$(node -e "console.log(JSON.parse(require('fs').readFileSync('npm-pack.json','utf8'))[0].filename)")"
          echo "tarball=$FILENAME" >> "$GITHUB_OUTPUT"
        id: pack

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: warn
          retention-days: 7

      - name: Generate release notes body (CHANGELOG excerpt)
        id: relnotes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -f CHANGELOG.md ]; then
            # Try to extract the section for this tag from CHANGELOG.md
            awk -v tag="[$TAG]" '
              $0 ~ "^## \\[" && found { exit }
              found { print }
              $0 ~ "^## \\[" tag "\\]" { found=1; print }
            ' CHANGELOG.md > RELEASE_BODY.md || true
          fi
          if [ ! -s RELEASE_BODY.md ]; then
            echo "No specific section found in CHANGELOG.md; using autogenerated notes." > RELEASE_BODY.md
          fi
          echo "body_path=RELEASE_BODY.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.relnotes.outputs.body_path }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
